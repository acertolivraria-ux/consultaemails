<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Consulta</title>
<link rel="stylesheet" href="style.css">
  <script>
  (function () {
    const theme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
</head>

<body>
 <div class="menu">

  <div class="menu-left">
    <a href="index.html">🔎 Consulta</a>

    <div class="dropdown-admin">
      <button id="adminToggle" class="menu-btn">
        🔐 Admin ▾
      </button>

      <div id="adminDropdown" class="menu-dropdown">
        <a href="admin.html#cadastro">📝 Cadastro</a>
        <a href="admin.html#alteracao">🔍 Alteração / Consulta</a>
      </div>
    </div>

  </div>

  <div class="menu-right">

    <button id="themeToggle" class="theme-toggle">🌙</button>

    <!-- LOGIN/LOGOUT UNIFICADO -->
    <div class="profile-menu">

      <button id="profileToggle" class="theme-toggle">👤</button>

      <div id="profileDropdown" class="profile-dropdown">

        <!-- CONTEÚDO CONTROLADO PELO JS -->

        <div id="loginForm" style="display:none;">
          <input id="loginEmail" placeholder="Email">
          <input id="loginSenha" type="password" placeholder="Senha">
          <button id="loginBtn">Entrar</button>
        </div>

        <div id="logoutBox" style="display:none;">
          <p>Logado</p>
          <button onclick="logout()">🚪 Sair</button>
        </div>

      </div>
    </div>

  </div>

</div>

<div class="container">

<h2>Consulta de Contatos</h2>

<input id="loja" placeholder="Loja">
<input id="editora" placeholder="Editora ou CNPJ">

<button onclick="pesquisar()">Pesquisar</button>

<div id="resultado"></div>

</div>

<script type="module" src="script.js"></script>
  <script type="module">
  import { initThemeToggle } from "./theme.js";
  initThemeToggle("themeToggle");
</script>

</body>
</html>
