<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consulta</title>

<link rel="stylesheet" href="style.css">


<script>

(function(){

  const theme =
    localStorage.getItem("theme")
    || "light";


  document.documentElement.setAttribute(
    "data-theme",
    theme
  );


})();

</script>


</head>


<body>



<!-- ================= MENU ================= -->


<div class="menu">



  <div class="menu-left">



    <a href="index.html">
      🔎 Consulta
    </a>




    <div
      class="admin-menu"
      id="adminMenu"
    >



      <button
        id="adminToggle"
        class="theme-toggle"
      >

        ⚙️ Admin ▾

      </button>




      <div
        id="adminDropdown"
        class="profile-dropdown"
      >


        <a href="admin.html">
          📝 Cadastro
        </a>


        <a href="alteracao.html">
          🔍 Alteração / Consulta
        </a>

        <a href="divergencias.html">
          📊 Divergências
        </a>


      </div>



    </div>



  </div>







  <div class="menu-right">



    <button
      id="themeToggle"
      class="theme-toggle"
    >
      🌙
    </button>





    <div class="profile-menu">



      <button
        id="profileToggle"
        class="theme-toggle"
      >
        👤
      </button>





      <div
        id="profileDropdown"
        class="profile-dropdown"
      >



        <div id="loginForm">



          <input
            id="loginEmail"
            placeholder="Email"
          >



          <input
            id="loginSenha"
            type="password"
            placeholder="Senha"
          >



          <button id="loginBtn">

            Entrar

          </button>



        </div>





        <div
          id="logoutBox"
          style="display:none;"
        >


          <p id="loginStatus">
            Logado
          </p>


          <button onclick="logout()">

            🚪 Sair

          </button>



        </div>





      </div>



    </div>



  </div>



</div>







<!-- ================= CONSULTA ================= -->


<div class="container">



<h2>
Consulta de Contatos
</h2>




<input
id="loja"
placeholder="Loja"
>




<input
id="editora"
placeholder="Editora ou CNPJ"
>




<button onclick="pesquisar()">

Pesquisar

</button>




<div id="resultado"></div>



</div>







<!-- ================= SCRIPTS ================= -->


<script
type="module"
src="script.js"
></script>



<script
type="module"
src="theme.js"
></script>



<script
type="module"
src="menu.js"
></script>



</body>


</html>
