<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Lojas</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:10px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}
</style>

</head>
<body>

<div class="container">
    <h2>Consulta</h2>

    <label>Número da Loja</label>
    <input type="number" id="loja">

    <label>Editora</label>
    <input type="text" id="editora">

    <button onclick="enviar()">Pesquisar</button>
</div>

<script>
function enviar(){
    const loja = document.getElementById("loja").value;
    const editora = document.getElementById("editora").value;

    alert(`Loja: ${loja}\nEditora: ${editora}`);
}
</script>

</body>
</html>
