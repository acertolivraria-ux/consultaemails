<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Divergências</title>

<link rel="stylesheet" href="style.css">


<script>

(function(){

const theme =
localStorage.getItem("theme")
|| "light";


document.documentElement.setAttribute(
"data-theme",
theme
);


})();

</script>

</head>


<body>



<!-- ================= MENU ================= -->


<div class="menu">



<div class="menu-left">


<a href="index.html">
🔎 Consulta
</a>



<div
class="admin-menu"
id="adminMenu"
>


<button
id="adminToggle"
class="theme-toggle"
>

⚙️ Admin ▾

</button>



<div
id="adminDropdown"
class="profile-dropdown"
>


<a href="admin.html">
📝 Cadastro
</a>


<a href="alteracao.html">
🔍 Alteração / Consulta
</a>


</div>


</div>



</div>






<div class="menu-right">



<button
id="themeToggle"
class="theme-toggle"
>

🌙

</button>





<div class="profile-menu">


<button
id="profileToggle"
class="theme-toggle"
>

👤

</button>




<div
id="profileDropdown"
class="profile-dropdown"
>



<div id="loginForm">


<input
id="loginEmail"
placeholder="Email"
>


<input
id="loginSenha"
type="password"
placeholder="Senha"
>


<button id="loginBtn">

Entrar

</button>


</div>





<div
id="logoutBox"
style="display:none"
>


<p id="loginStatus">

Logado

</p>



<button onclick="logout()">

🚪 Sair

</button>



</div>




</div>



</div>



</div>



</div>









<!-- ================= CONTEÚDO ================= -->


<div class="container">



<h2>
📋 Divergências
</h2>





<div class="tabs">


<button onclick="filtrarDivergencias('todas')">

Todas

</button>



<button onclick="filtrarDivergencias('EM ANDAMENTO')">

Em andamento

</button>



<button onclick="filtrarDivergencias('FINALIZADO')">

Finalizadas

</button>



</div>





<hr>






<div
id="listaDivergencias"
>


<p>

Carregando divergências...

</p>


</div>





</div>









<!-- ================= MODAL EDIÇÃO ================= -->


<div
id="modalDivergencia"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
align-items:center;
justify-content:center;
z-index:2000;
"
>




<div
style="
background:var(--surface);
padding:20px;
border-radius:10px;
width:90%;
max-width:500px;
"
>



<button
onclick="fecharModal()"
style="
float:right;
"
>

❌

</button>



<h3>
Editar divergência
</h3>





<label>

Status

</label>



<select
id="editStatus"
>


<option>
FINALIZADO
</option>


<option>
EM ANDAMENTO
</option>


<option>
AGUARDANDO MAPA ATUALIZADO
</option>


<option>
ANALISADO
</option>


<option>
RESPONSABILIDADE DA LOJA
</option>


</select>







<label>

Link do e-mail

</label>


<input
id="editLinkEmail"
placeholder="Cole o link do Gmail"
/>







<label>

Acerto realizado?

</label>


<select
id="editResolvido"
>


<option value="true">

Sim

</option>



<option value="false">

Não

</option>


</select>








<label>

Motivo caso não realizado

</label>



<input
id="editMotivo"
/>







<label>

Observações

</label>


<textarea
id="editObservacoes"
style="
width:100%;
min-height:100px;
"
></textarea>







<label>

Última resposta

</label>


<textarea
id="editUltimaResposta"
style="
width:100%;
min-height:100px;
"
></textarea>








<label>

Data de resolução

</label>


<input
id="editDataResolucao"
type="date"
/>







<button
onclick="salvarAlteracaoDivergencia()"
>

💾 Salvar

</button>



</div>




</div>









<!-- ================= SCRIPTS ================= -->


<script
type="module"
src="theme.js"
></script>


<script
type="module"
src="menu.js"
></script>


<script
type="module"
src="divergencias.js"
></script>



</body>


</html>
