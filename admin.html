<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<link rel="stylesheet" href="style.css">
  <script>
  (function () {
    const theme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
</head>

<body>

 <div class="menu">
  <div class="menu-left">
    <a href="index.html">🔎 Consulta</a>
    <a href="admin.html">🔐 Admin</a>
  </div>

  <div class="menu-right">
  <button id="themeToggle" class="theme-toggle">🌙</button>

  <div class="profile-menu">
    <button id="profileToggle" class="theme-toggle">
      👤
    </button>

    <div id="profileDropdown" class="profile-dropdown">
      <button onclick="logout()">
        🚪 Sair
      </button>
    </div>
  </div>
</div>
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">

  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->
<div id="painel" style="display:none">

  <h2>Painel Administrativo</h2>

  <!-- ABAS -->
  <div class="tabs">

    <button onclick="mostrarAba('lojas')">🏬 Lojas</button>
    <button onclick="mostrarAba('editoras')">🏢 Editoras</button>
    <button onclick="mostrarAba('contatos')">📧 Contatos</button>

  </div>

  <hr>

  <!-- ===================== LOJAS ===================== -->
  <div id="aba-lojas" class="aba">

    <h3>Cadastrar Loja</h3>

    <input id="numeroLoja" placeholder="Número">
    <input id="nomeLoja" placeholder="Nome">

    <button onclick="salvarLoja()">Salvar Loja</button>

  </div>

  <!-- ===================== EDITORAS ===================== -->
  <div id="aba-editoras" class="aba" style="display:none">

    <h3>Cadastrar Editora</h3>

    <input id="cnpjEditora" placeholder="CNPJ">
    <input id="nomeEditora" placeholder="Nome">

    <button onclick="salvarEditora()">Salvar Editora</button>

  </div>

  <!-- ===================== CONTATOS ===================== -->
  <div id="aba-contatos" class="aba" style="display:none">

    <h3>Cadastrar Contato</h3>

    <label>Email *</label>
    <input id="emailContato" type="email" placeholder="email@empresa.com">

    <label>Nome (opcional)</label>
    <input id="nomeContato" placeholder="Nome do responsável">

    <br><br>

    <!-- EDITORA -->
    <label>Editora *</label>
    <select id="cnpjContato">
      <option value="">Selecione a editora</option>
    </select>

    <br><br>

    <!-- LOJAS MULTI -->
    <label>Lojas *</label>

    <div class="dropdown-multi">

      <button type="button" onclick="toggleLojasDropdown()">
        <div id="aba-contatos" class="aba" style="display:none">

  <h3>Cadastrar Contato</h3>

  <label>Email *</label>
  <input id="emailContato" type="email" placeholder="email@empresa.com">

  <label>Nome (opcional)</label>
  <input id="nomeContato" placeholder="Nome do responsável">

  <br><br>

  <label>Editora *</label>
  <select id="cnpjContato">
    <option value="">Selecione a editora</option>
  </select>

  <br><br>

  <label>Lojas *</label>

  <div class="dropdown-multi">

    <button type="button" onclick="toggleLojasDropdown()">
      Selecionar lojas ▼
    </button>

    <div id="lojasDropdownList" class="dropdown-content" style="display:none;"></div>

  </div>

  <br><br>

  <button onclick="salvarContato()">Salvar Contato</button>

  <hr>

  <h3>Importação CSV</h3>

  <input type="file" id="csvFile" accept=".csv">
  <br><br>

  <button onclick="importarCSV()">Importar CSV</button>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>
  <script type="module">
  import { initThemeToggle } from "./theme.js";
  initThemeToggle("themeToggle");
</script>

</body>
</html>
