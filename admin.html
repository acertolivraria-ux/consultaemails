<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox">

<h2>Login Admin</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- PAINEL -->
<div id="painel" style="display:none">

<h2>Painel de Cadastro</h2>

<hr>

<h3>📌 Nova Editora</h3>

<input id="nome" placeholder="Nome da editora">
<input id="cnpj" placeholder="CNPJ">
<input id="lojas" placeholder="Lojas (001,002,003)">

<hr>
<h3>🏬 Cadastrar Loja</h3>

<input id="numeroLoja" placeholder="Número da loja">
<input id="nomeLoja" placeholder="Nome da loja">

<button onclick="salvarLoja()">Salvar Loja</button>

<hr>
<h3>📧 Contato</h3>

<input id="emailContato" placeholder="Email do contato">

<button onclick="salvar()">Salvar</button>

<br><br>

<button onclick="logout()">Sair</button>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
