<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin</title>

<link rel="stylesheet" href="style.css">


<script>

(function(){

  const theme =
    localStorage.getItem("theme")
    || "light";


  document.documentElement.setAttribute(
    "data-theme",
    theme
  );


})();

</script>

</head>


<body>


<!-- ================= MENU ================= -->


<div class="menu">


<div class="menu-left">


<a href="index.html">
🔎 Consulta
</a>



<div
class="admin-menu"
id="adminMenu"
>


<button
id="adminToggle"
class="theme-toggle"
>

⚙️ Admin ▾

</button>



<div
id="adminDropdown"
class="profile-dropdown"
>


<a href="admin.html">
📝 Cadastro
</a>


<a href="alteracao.html">
🔍 Alteração / Consulta
</a>


<a href="divergencias.html">
📊 Divergências
</a>


</div>


</div>


</div>





<div class="menu-right">


<button
id="themeToggle"
class="theme-toggle"
>
🌙
</button>




<div class="profile-menu">


<button
id="profileToggle"
class="theme-toggle"
>
👤
</button>



<div
id="profileDropdown"
class="profile-dropdown"
>



<div id="loginForm">


<input
id="loginEmail"
placeholder="Email"
>


<input
id="loginSenha"
type="password"
placeholder="Senha"
>


<button id="loginBtn">
Entrar
</button>


</div>




<div
id="logoutBox"
style="display:none;"
>


<p id="loginStatus">
Logado
</p>


<button onclick="logout()">
🚪 Sair
</button>


</div>



</div>


</div>


</div>


</div>





<!-- ================= CONTEÚDO ================= -->


<div class="container">


<div id="painel">


<h2>
Painel Administrativo
</h2>



<div class="tabs">


<button onclick="mostrarAba('lojas')">
🏬 Lojas
</button>


<button onclick="mostrarAba('editoras')">
🏢 Editoras
</button>


<button onclick="mostrarAba('contatos')">
📧 Contatos
</button>


<button onclick="mostrarAba('operadores')">
👤 Operadores
</button>


<button onclick="mostrarAba('assinaturas')">
✍️ Assinaturas
</button>


<button onclick="mostrarAba('modelos')">
✉️ Modelos de E-mail
</button>


</div>


<hr>




<!-- ================= LOJAS ================= -->


<div
id="aba-lojas"
class="aba"
>


<h3>
Cadastrar Loja
</h3>


<input
id="numeroLoja"
placeholder="Número da loja"
>


<input
id="nomeLoja"
placeholder="Nome da loja"
>


<input
id="cnpjLoja"
placeholder="CNPJ da loja"
>


<textarea
id="emailsLoja"
placeholder="E-mails da loja separados por ;"
></textarea>


<button onclick="salvarLoja()">
Salvar Loja
</button>


</div>





<!-- ================= EDITORAS ================= -->


<div
id="aba-editoras"
class="aba"
style="display:none"
>


<h3>
Cadastrar Editora
</h3>


<input
id="cnpjEditora"
placeholder="CNPJ da editora"
>


<input
id="nomeEditora"
placeholder="Nome da editora"
>


<textarea
id="emailsEditora"
placeholder="E-mails da editora separados por ;"
></textarea>


<button onclick="salvarEditora()">
Salvar Editora
</button>


</div>





<!-- ================= CONTATOS ================= -->


<div
id="aba-contatos"
class="aba"
style="display:none"
>


<h3>
Importação de Contatos (CSV)
</h3>


<p>
A importação continua utilizando o arquivo CSV.
</p>


<input
type="file"
id="csvFile"
accept=".csv"
>


<select id="modoImportacao">

<option value="acrescentar">
Acrescentar contatos
</option>


<option value="sobrescrever">
Sobrescrever loja/editora
</option>

</select>


<button onclick="importarCSV()">
Importar CSV
</button>


<div id="importProgress"></div>


</div>
<!-- ================= OPERADORES ================= -->


<div
id="aba-operadores"
class="aba"
style="display:none"
>


<h3>
Cadastrar Operador
</h3>



<input
id="nomeOperador"
placeholder="Nome do operador"
>



<input
id="emailOperador"
placeholder="E-mail do operador"
>



<button onclick="salvarOperador()">
Salvar Operador
</button>



</div>






<!-- ================= ASSINATURAS ================= -->


<div
id="aba-assinaturas"
class="aba"
style="display:none"
>



<h3>
Cadastrar Assinatura
</h3>




<select
id="operadorAssinatura"
>

<option value="">
Selecione o operador
</option>


</select>





<textarea
id="textoAssinatura"
placeholder="Digite a assinatura"
></textarea>





<button onclick="salvarAssinatura()">

Salvar Assinatura

</button>



</div>







<!-- ================= MODELOS DE EMAIL ================= -->


<div
id="aba-modelos"
class="aba"
style="display:none"
>



<h3>
Cadastrar Modelo de E-mail
</h3>





<input
id="motivoEmail"
placeholder="Motivo da divergência"
>





<input
id="tituloEmail"
placeholder="Título do e-mail"
>





<textarea
id="corpoEmail"
placeholder="Corpo do e-mail. Use campos como {{LOJA}}, {{EDITORA}}, {{NOTA}}"
></textarea>





<h4>
Enviar para:
</h4>



<label>

<input
type="checkbox"
id="destinoLoja"
>

Loja

</label>



<br>



<label>

<input
type="checkbox"
id="destinoEditora"
>

Editora

</label>



<br><br>




<button onclick="salvarModeloEmail()">

Salvar Modelo

</button>




</div>





</div>


</div>





<!-- ================= SCRIPTS ================= -->


<script
type="module"
src="theme.js"
></script>



<script
type="module"
src="menu.js"
></script>



<script
type="module"
src="admin.js"
></script>



<script
type="module"
src="importacao.js"
></script>


</body>


</html>
